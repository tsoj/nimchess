on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    name: ${{ matrix.os }} - ${{ matrix.nimversion }}
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install stockfish and fastchess
        shell: bash
        run: .github/install-stuff.sh fastchess-extract stockfish-extract

      - name: Setup Nimble
        uses: nim-lang/setup-nimble-action@d27cc947821b39107883efa4a65f890a12d7d7d8
        with:
          nimble-version: "latest"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Nimble Test
        shell: bash
        run: nimble test -d:release -d:maxNumPerftNodes=100000 -d:testEngine="$TEST_ENGINE" -d:fastchessBinPath="$FASTCHESS"

      - name: Compile test
        shell: bash
        run: find . -name "*.nim" -print0 | xargs -n 1 -0 nimble c $1 -o:"compilertestbinary" && rm compilertestbinary

      - name: Code formatting
        shell: bash
        run: |
          nimble install nph
          export PATH="$HOME/.nimble/bin:$PATH"
          echo "nph version (make sure to use the same one): $(nph --version)"
          nph --diff .
          if ! nph --check .; then
            echo ""
            echo "::error::Code formatting check failed. Please run 'nph .' locally and commit the changes."
            exit 1
          fi
